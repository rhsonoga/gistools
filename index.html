<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GIS TOOLS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Sans:ital,wght@0,300..800;1,300..800&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

    :root {
      --bg0: #101214;
      --bg1: #1a1a1a;
      --panel: rgba(17, 20, 23, 0.92);
      --border: #3e454f;
      --muted: #cfd5db;
      --text: #ffffff;
      --accent: #E95420;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Ubuntu Sans', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg0) 0%, var(--bg1) 35%, #0f1114 100%);
      min-height: 100vh;
    }
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: linear-gradient(180deg, #2a2f35 0%, #1f2328 100%);
      border-bottom: 1px solid #40464f;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .dots {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .brand {
      margin-left: 10px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .brand-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .brand-link:hover {
      color: #ffffff;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }
    .dot.red { background: #ff605c; }
    .dot.yellow { background: #ffbd44; }
    .dot.green { background: #00ca4e; }

    .actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      appearance: none;
      border: 1px solid #4a515b;
      background: #2f343c;
      color: #f2f4f6;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .btn:hover { background: #3a414b; }

    .menu {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 10px;
      background: #20242a;
      border-bottom: 1px solid #3a4048;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: sticky;
      top: 56px;
      z-index: 49;
    }
    .menu::-webkit-scrollbar { height: 8px; }
    .menu::-webkit-scrollbar-thumb { background: #3a4048; border-radius: 999px; }
    .menu-item {
      border: 1px solid transparent;
      background: #2a2f36;
      color: #d9dee3;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      user-select: none;
    }
    .menu-item:hover {
      background: #343b45;
      border-color: #3e454f;
      color: #ffffff;
    }

    .menu-item.active {
      background: #FF8C00;
      border-color: #FF8C00;
      color: #111417;
    }

    .menu-item.placeholder {
      opacity: 0.72;
    }

    .menu-item.placeholder::after {
      content: "";
    }

    .content {
      flex: 1;
      padding: 0;
    }

    .panel {
      overflow: hidden;
      background: transparent;
      min-height: calc(100vh - 112px);
    }

    .panel.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .panel-header {
      display: none;
    }

    .panel-frame {
      width: 100%;
      border: 0;
      display: block;
      height: calc(100vh - 112px);
      min-height: calc(100vh - 112px);
      background: transparent;
    }

    .tutorial-panel {
      min-height: calc(100vh - 112px);
      border: 0;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      padding: 18px;
    }

    @media (max-width: 640px) {
      .panel-frame {
        min-height: 70vh;
        height: 70vh;
      }
    }

  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div style="display:inline-flex; align-items:center;">
        <div class="dots" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div class="brand"><a class="brand-link" href="./index.html">GIS PROJECT</a></div>
      </div>
      <div class="actions">
        <a class="btn" href="#">SIGNUP</a>
        <a class="btn" href="#">LOGIN</a>
      </div>
    </header>

    <nav class="menu" aria-label="Menu">
      <a class="menu-item" href="#tutorial">TUTORIAL</a>
      <a class="menu-item" href="#cable">CABLE CONVERTER</a>
      <a class="menu-item" href="#hpdb">HPDB CONVERTER</a>
      <a class="menu-item" href="#boq">BOQ CONVERTER</a>
      <a class="menu-item" href="#boundary">BOUNDARY AREA</a>
      <a class="menu-item" href="#fdt">FDT AREA</a>
      <a class="menu-item" href="#fat">FAT AREA</a>
      <a class="menu-item" href="#line">LINE AREA</a>
    </nav>

    <main class="content">
      <section class="tutorial-panel" id="tutorialPanel">
        TUTORIAL
      </section>
      <section class="panel hidden" id="cablePanel">
        <iframe class="panel-frame" id="cableFrame" title="CABLE Converter"></iframe>
      </section>
      <section class="panel hidden" id="hpdbPanel">
        <iframe class="panel-frame" id="hpdbFrame" title="HPDB Converter"></iframe>
      </section>
      <section class="panel hidden" id="boqPanel">
        <iframe class="panel-frame" id="boqFrame" title="BOQ Converter"></iframe>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var cableUrl = "./cable_converter/cable_page.html?embed=1";
      var hpdbUrl = "./hpdb_converter/hpdb_page.html";
      var boqUrl = "./boq_converter/boq_page.html";

      function setActiveMenu(hash) {
        var items = document.querySelectorAll(".menu-item");
        for (var i = 0; i < items.length; i++) {
          var href = items[i].getAttribute("href") || "";
          if (href.charAt(0) === "#" && href === hash) {
            items[i].classList.add("active");
          } else {
            items[i].classList.remove("active");
          }
        }
      }

      function setViewByHash() {
        var hash = window.location.hash || "#tutorial";
        var tutorialPanel = document.getElementById("tutorialPanel");
        var cablePanel = document.getElementById("cablePanel");
        var hpdbPanel = document.getElementById("hpdbPanel");
        var boqPanel = document.getElementById("boqPanel");
        var cableFrame = document.getElementById("cableFrame");
        var hpdbFrame = document.getElementById("hpdbFrame");
        var boqFrame = document.getElementById("boqFrame");

        if (hash === "#cable") {
          tutorialPanel.classList.add("hidden");
          hpdbPanel.classList.add("hidden");
          boqPanel.classList.add("hidden");
          cablePanel.classList.remove("hidden");
          if (!cableFrame.getAttribute("src")) {
            cableFrame.setAttribute("src", cableUrl);
          }
          setActiveMenu("#cable");
          return;
        }

        if (hash === "#hpdb") {
          tutorialPanel.classList.add("hidden");
          cablePanel.classList.add("hidden");
          boqPanel.classList.add("hidden");
          hpdbPanel.classList.remove("hidden");
          if (!hpdbFrame.getAttribute("src")) {
            hpdbFrame.setAttribute("src", hpdbUrl);
          }
          setActiveMenu("#hpdb");
          return;
        }

        if (hash === "#boq") {
          tutorialPanel.classList.add("hidden");
          cablePanel.classList.add("hidden");
          hpdbPanel.classList.add("hidden");
          boqPanel.classList.remove("hidden");
          if (!boqFrame.getAttribute("src")) {
            boqFrame.setAttribute("src", boqUrl);
          }
          setActiveMenu("#boq");
          return;
        }

        cablePanel.classList.add("hidden");
        hpdbPanel.classList.add("hidden");
        boqPanel.classList.add("hidden");
        tutorialPanel.classList.remove("hidden");
        setActiveMenu("#tutorial");
      }

      if (!window.location.hash) {
        window.location.hash = "#tutorial";
      }

      window.addEventListener("hashchange", setViewByHash);
      window.addEventListener("DOMContentLoaded", setViewByHash);
    })();
  </script>
</body>
</html>
